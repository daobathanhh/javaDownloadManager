# Test: in-memory H2, no Flyway (schema from ddl-auto)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT (required by JwtTokenService)
jdm.token.access-token-expiry-seconds=900
jdm.token.refresh-token-expiry-seconds=604800
jdm.token.refresh-access-token-if-expires-within-seconds=3600
jdm.password.bcrypt-strength=10

# gRPC test: use real port so client metadata (e.g. Authorization) is sent to server
grpc.server.port=19090
grpc.client.test.address=static://127.0.0.1:19090
grpc.client.test.negotiationType=PLAINTEXT
