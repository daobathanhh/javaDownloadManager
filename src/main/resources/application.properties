spring.application.name=jdm
grpc.server.port=9090

spring.datasource.url=jdbc:mysql://${XDM_DB_HOST}:${XDM_DB_PORT}/${XDM_DB_NAME}?createDatabaseIfNotExist=false&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${XDM_DB_USER}
spring.datasource.password=${XDM_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# BCrypt cost (strength): 10 = default, 12 = stronger/slower. Range typically 4-31.
jdm.password.bcrypt-strength=10

# JWT: access token 15 min, refresh token 7 days (default)
jdm.token.access-token-expiry-seconds=900
jdm.token.refresh-token-expiry-seconds=604800

# Redis (optional).
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=

# Mail / password-reset: see application-mail.properties (or set spring.config.import to load it)
spring.config.import=optional:classpath:application-mail.properties