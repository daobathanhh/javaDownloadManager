# Main config is loaded from classpath (src/main/resources). Run with: ./gradlew bootRun (from project root)
# Or ensure application.properties is on classpath / in same dir as JAR when using java -jar.
spring.application.name=jdm
grpc.server.port=9090
# Listen on all interfaces so gRPC is reachable from other hosts (Docker, LAN). Omit or use localhost for local-only.
grpc.server.address=0.0.0.0
# Enable gRPC reflection so grpcurl/Postman can list and call services without a proto file
grpc.server.reflection-service=true

# DB: use env XDM_DB_* when set; otherwise defaults for local dev (e.g. ./gradlew bootRun)
spring.datasource.url=jdbc:mysql://${XDM_DB_HOST:localhost}:${XDM_DB_PORT:3306}/${XDM_DB_NAME:jdm}?createDatabaseIfNotExist=false&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${XDM_DB_USER:root}
spring.datasource.password=${XDM_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# BCrypt cost (strength): 10 = default, 12 = stronger/slower. Range typically 4-31.
jdm.password.bcrypt-strength=10

# JWT: access token 15 min, refresh token 7 days (default)
jdm.token.access-token-expiry-seconds=900
jdm.token.refresh-token-expiry-seconds=604800
# Continue session: client should call RefreshSession when access token TTL is below this (e.g. 1h)
jdm.token.refresh-access-token-if-expires-within-seconds=3600

# Redis (optional).
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=

# Also load config from current directory when running (e.g. java -jar from folder that has application.properties)
spring.config.additional-location=optional:file:./
# Mail / password-reset: see application-mail.properties (or set spring.config.import to load it)
spring.config.import=optional:classpath:application-mail.properties

# Logging: show all application and framework logs (verbose; use INFO in production)
logging.level.root=DEBUG
logging.level.com.java_download_manager.jdm=DEBUG
# Avoid flooding log with auto-config "Did not match" report (set to DEBUG to see it)
logging.level.org.springframework.boot.autoconfigure.logging=WARN
# Uncomment for TRACE (very noisy) or to see SQL / gRPC / Redis in detail:
# logging.level.com.java_download_manager.jdm=TRACE
# spring.jpa.show-sql=true
# logging.level.io.grpc=DEBUG
# logging.level.org.springframework.data.redis=DEBUG
