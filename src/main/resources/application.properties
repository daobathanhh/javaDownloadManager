spring.application.name=jdm
grpc.server.port=9090
grpc.server.address=0.0.0.0
grpc.server.reflection-service=true

spring.datasource.url=jdbc:mysql://${XDM_DB_HOST:localhost}:${XDM_DB_PORT:3306}/${XDM_DB_NAME:jdm}?createDatabaseIfNotExist=false&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${XDM_DB_USER:root}
spring.datasource.password=${XDM_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# BCrypt cost (strength): 10 = default, 12 = stronger/slower. Range typically 4-31.
jdm.password.bcrypt-strength=10

# JWT: access token 15 min, refresh token 7 days (default)
jdm.token.access-token-expiry-seconds=900
jdm.token.refresh-token-expiry-seconds=604800
# Continue session: client should call RefreshSession when access token TTL is below this (e.g. 1h)
jdm.token.refresh-access-token-if-expires-within-seconds=3600

# Redis
spring.redis.host=${XDM_REDIS_HOST:}
spring.redis.port=${XDM_REDIS_PORT:}
# spring.redis.password=${XDM_REDIS_PASSWORD:}

# RabbitMQ (optional: disable with spring.autoconfigure.exclude=...RabbitAutoConfiguration if not used)
spring.rabbitmq.host=${XDM_RABBITMQ_HOST:}
spring.rabbitmq.port=${XDM_RABBITMQ_PORT:}
spring.rabbitmq.username=${XDM_RABBITMQ_USERNAME:}
spring.rabbitmq.password=${XDM_RABBITMQ_PASSWORD:}
# Queue for "download task created" events (producer sends; consumer runs the download)
jdm.rabbitmq.queue.download-task-created=jdm.download-task.created

# Cron fallback: execute PENDING tasks (when RabbitMQ misses events)
# Format: second minute hour day month weekday. "*/10 * * * * ?" = every 30 seconds
jdm.cron.execute-pending-download-task=*/30 * * * * ?

# Download: parallel connection count (IDM-style dynamic segmentation)
jdm.download.chunk-count=4
# Minimum segment size before splitting stops (bytes; default 256KB)
jdm.download.min-segment-size-bytes=262144
# Skip SSL cert validation (insecure; use for servers with expired/invalid certs)
jdm.download.ssl-insecure-skip-verify=${XDM_DOWNLOAD_SSL_INSECURE:false}

# S3 / MinIO storage (jdm.storage.s3.bucket required; default jdm when using local MinIO)
jdm.storage.s3.bucket=${XDM_STORAGE_S3_BUCKET:}
jdm.storage.s3.region=${XDM_S3_REGION:}
jdm.storage.s3.endpoint=${XDM_S3_ENDPOINT:}
jdm.storage.s3.access-key=${XDM_S3_ACCESS_KEY:}
jdm.storage.s3.secret-key=${XDM_S3_SECRET_KEY:}
jdm.storage.s3.path-style-access=${XDM_S3_PATH_STYLE:}

# Also load config from current directory when running (e.g. java -jar from folder that has application.properties)
spring.config.additional-location=optional:file:./
# Mail / password-reset: see application-mail.properties (or set spring.config.import to load it)
spring.config.import=optional:classpath:application-mail.properties

# Logging: show all application and framework logs (verbose; use INFO in production)
logging.level.root=INFO
logging.level.com.java_download_manager.jdm=DEBUG
# Avoid flooding log with auto-config "Did not match" report (set to DEBUG to see it)
logging.level.org.springframework.boot.autoconfigure.logging=WARN
