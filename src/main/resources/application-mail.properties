# Mail / password-reset config (loaded in addition to application.properties)
# You can override these in application.properties or via env.

# Reset page URL. Link in email: {base-url}?token=...
jdm.password-reset.base-url=${JDM_PASSWORD_RESET_BASE_URL:http://localhost:3000/reset}

# How long the reset token is valid (minutes). E.g. 1440=24h, 30=30min, 60=1h.
jdm.password-reset.expiry-minutes=${JDM_PASSWORD_RESET_EXPIRY_MINUTES:1440}

# From address for outgoing mail (e.g. noreply@yourdomain.com)
jdm.mail.from=${JDM_MAIL_FROM:noreply@jdm.local}

# Email subject and body. Placeholders: {resetLink}, {expiryDescription}
jdm.mail.password-reset.subject=Reset your password
jdm.mail.password-reset.expiry-description=${JDM_MAIL_PASSWORD_RESET_EXPIRY_DESCRIPTION:24 hours}
jdm.mail.password-reset.body=Click the link below to reset your password:\n\n{resetLink}\n\nThis link expires in {expiryDescription}.
